<!-- Class Performance 01: Inline CSS - Font and Text Styling
     Topic   : Using inline style="" to control font properties
     Task    : Style each element below using inline CSS.
               Try changing the values and observe the result.
-->
<!doctype html>
<html>
  <body>
    <!-- styled with font-family, font-size, color, text-align -->
    <h1
      style="
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 48px;
        color: #03e421;
        text-align: right;
      "
    >
      Georgia Gwinnett College
    </h1>

    <!-- styled with font-family, font-style, color -->
    <p
      style="font-family: 'Franklin Gothic Medium', sans-serif; font-style: oblique; color: #555555;"
    >
      This paragraph uses Franklin Gothic medium font , oblique, and a dark gray color.
    </p>

    <!-- styled with font-weight, text-decoration, color -->
    <p
      style="
        font-family: &quot;Courier New&quot;, monospace;
        font-weight: bold;
        text-decoration: line-through;
        color: navy;
      "
    >
      This paragraph uses Courier New, bold weight, and has a line through decoration
    </p>

    <!-- styled with font-size, line-height, color -->
    <p
      style="
        font-family: Verdana, sans-serif;
        font-size: 20px;
        line-height: 8;
        font-style: italic;
        color: rgb(255, 0, 149);
      "
    >
      This paragraph uses Verdana, a larger font size, double line spacing and italics
    </p>
  </body>
</html>
