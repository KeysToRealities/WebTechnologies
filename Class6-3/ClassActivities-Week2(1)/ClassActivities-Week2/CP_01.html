<!-- Class Performance 01: Inline CSS - Font and Text Styling
     Topic   : Using inline style="" to control font properties
     Task    : Style each element below using inline CSS.
               Try changing the values and observe the result.
-->
<!doctype html>
<html>
  <body>
    <!-- styled with font-family, font-size, color, text-align -->
    <h1
      style="
        font-family: Georgia, serif;
        font-size: 36px;
        color: #006341;
        text-align: center;
      "
    >
      Georgia Gwinnett College
    </h1>

    <!-- styled with font-family, font-style, color -->
    <p
      style="font-family: Arial, sans-serif; font-style: italic; color: #555555"
    >
      This paragraph uses Arial, italic style, and a dark gray color.
    </p>

    <!-- styled with font-weight, text-decoration, color -->
    <p
      style="
        font-family: &quot;Courier New&quot;, monospace;
        font-weight: bold;
        text-decoration: underline;
        color: navy;
      "
    >
      This paragraph uses Courier New, bold weight, and underline decoration.
    </p>

    <!-- styled with font-size, line-height, color -->
    <p
      style="
        font-family: Verdana, sans-serif;
        font-size: 20px;
        line-height: 2;
        color: darkred;
      "
    >
      This paragraph uses Verdana, a larger font size, and double line spacing.
    </p>
  </body>
</html>
